version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf flutter
        - git clone --depth 1 https://github.com/flutter/flutter.git -b stable flutter
        - export PATH="$PATH:$PWD/flutter/bin"
        - flutter config --enable-web
        - flutter doctor
        - flutter pub get
    build:
      commands:
        - export PATH="$PATH:$PWD/flutter/bin"
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - .pub-cache/**/*
      - flutter/bin/cache/**/*